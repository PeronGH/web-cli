name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build

  release:
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag and GitHub release
      id-token: write # OIDC trusted publishing to npm (no token needed)
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # Trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: bun install --frozen-lockfile

      # The npm bundled with the runner predates OIDC trusted publishing.
      - run: npm install -g npm@latest

      - name: Check whether this version is already released
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already tagged — nothing to release."
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version.outputs.released == 'false'
        run: npm publish --access public

      - name: Tag and release
        if: steps.version.outputs.released == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes
